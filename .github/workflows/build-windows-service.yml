name: Build Windows Service

on:
  push:

    tags:
      - 'v*.*.*'
    paths:
      - 'main.cpp'
      - '.github/workflows/build-windows-service.yml'
  pull_request:
    branches:
      - 'v*.*.*'
      - 'release/*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (Release or Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Create build directory
      run: mkdir -p build

    - name: Compile Windows Service
      run: |
        rc.exe /fo build\resource.res resource.rc
        cl.exe /EHsc /O2 /DNDEBUG /Fe:build\zasca-guard.exe main.cpp build\resource.res /link advapi32.lib user32.lib shell32.lib ole32.lib oleaut32.lib
      shell: cmd

    - name: Get version from branch
      id: get_version
      run: |
        $branch = "${{ github.ref_name }}"
        if ($branch -match '^v(\d+\.\d+\.\d+)') {
          $version = $matches[1]
        } elseif ($branch -match '^release/v?(\d+\.\d+\.\d+)') {
          $version = $matches[1]
        } elseif ($branch -match '^version/v?(\d+\.\d+\.\d+)') {
          $version = $matches[1]
        } else {
          $version = "0.0.0"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version"
      shell: pwsh

    - name: Create distribution package
      run: |
        mkdir -p dist
        copy build\zasca-guard.exe dist\
        echo "# ZASCA Windows Service Guard v${{ steps.get_version.outputs.VERSION }}" > dist\README.txt
        echo "" >> dist\README.txt
        echo "Django Environment Guard Service for Windows" >> dist\README.txt
        echo "" >> dist\README.txt
        echo "Usage:" >> dist\README.txt
        echo "  zasca-guard.exe [port]        - Start service on specified port (default: 8000)" >> dist\README.txt
        echo "                                 First run will auto-initialize environment" >> dist\README.txt
        echo "  zasca-guard.exe init          - Manual initialize environment (install uv, sync dependencies)" >> dist\README.txt
        echo "  zasca-guard.exe start [port]  - Start service on specified port" >> dist\README.txt
        echo "  zasca-guard.exe stop          - Stop and uninstall service" >> dist\README.txt
        echo "  zasca-guard.exe restart [port] - Restart service" >> dist\README.txt
        echo "  zasca-guard.exe [any command] - Pass through to 'uv run python manage.py [command]'" >> dist\README.txt
        echo "" >> dist\README.txt
        echo "Features:" >> dist\README.txt
        echo "  - Auto-initialization on first run" >> dist\README.txt
        echo "  - Directory permissions set to admin-only access" >> dist\README.txt
        echo "  - China mirror acceleration for Python and packages" >> dist\README.txt
        echo "" >> dist\README.txt
        echo "Note: Run with Administrator privileges for service operations." >> dist\README.txt
      shell: pwsh

    - name: Create ZIP archive
      run: |
        Compress-Archive -Path dist\* -DestinationPath zasca-guard-v${{ steps.get_version.outputs.VERSION }}-windows-x64.zip
      shell: pwsh

    - name: Upload build artifact
      uses: actions/upload-artifact@v6
      with:
        name: zasca-guard-windows-x64-v${{ steps.get_version.outputs.VERSION }}
        path: build\zasca-guard.exe
        retention-days: 90

    - name: Upload distribution package
      uses: actions/upload-artifact@v6
      with:
        name: zasca-guard-dist-v${{ steps.get_version.outputs.VERSION }}
        path: zasca-guard-v${{ steps.get_version.outputs.VERSION }}-windows-x64.zip
        retention-days: 90

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Download artifact
      uses: actions/download-artifact@v6
      with:
        name: zasca-guard-dist-v${{ steps.get_version.outputs.VERSION }}
        path: ./dist

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/zasca-guard-v${{ steps.get_version.outputs.VERSION }}-windows-x64.zip
        body: |
          ## ZASCA Windows Service Guard v${{ steps.get_version.outputs.VERSION }}
          
          ### 功能特性
          - 首次启动自动初始化环境
          - 自动设置目录权限为仅管理员可访问
          - Django 开发服务器守护服务
          - 自动安装和配置 uv 包管理器
          - 全链路国内镜像加速（Python 解释器、pip 包）
          - 零信任安全保护（拒绝普通用户终止）
          
          ### 使用方法
          1. 以管理员身份运行 `zasca-guard.exe` 即可（首次运行会自动初始化）
          2. 或手动运行 `zasca-guard.exe init` 初始化环境
          3. 运行 `zasca-guard.exe [port]` 启动服务（默认端口 8000）
          4. 运行 `zasca-guard.exe stop` 停止服务
          
          ### 系统要求
          - Windows 10/11 或 Windows Server 2016+
          - 管理员权限（用于服务安装和权限设置）
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
